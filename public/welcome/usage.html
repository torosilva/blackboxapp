<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>BLACKBOX · Panel de consumo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background:#020617; color:#e2e8f0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; padding:32px 16px; }
  .wrap { max-width:920px; margin:0 auto; }
  .badge { color:#818cf8; font-size:12px; font-weight:800; letter-spacing:3px; }
  h1 { font-size:26px; font-weight:800; margin:6px 0 0; color:#fff; }
  .headerRow { display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:16px; margin-bottom:26px; }
  .rangeGroup { display:flex; gap:8px; }
  .rangeBtn { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); color:#94a3b8; padding:8px 14px; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; }
  .rangeBtn.active { background:#6366f1; border-color:#6366f1; color:#fff; }
  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:22px; }
  .kpi { background:rgba(99,102,241,.08); border:1px solid rgba(99,102,241,.22); border-radius:16px; padding:18px; }
  .kpiLabel { color:#818cf8; font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; }
  .kpiValue { font-size:24px; font-weight:800; color:#fff; margin-top:8px; }
  .card { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06); border-radius:16px; padding:20px; margin-bottom:18px; }
  .cardTitle { color:#6366f1; font-size:12px; font-weight:800; letter-spacing:2px; margin-bottom:18px; }
  .barHead { display:flex; justify-content:space-between; font-size:13px; color:#cbd5e1; margin-bottom:6px; }
  .barSub { color:#64748b; font-weight:400; }
  .barVal { color:#e2e8f0; font-weight:700; }
  .barTrack { background:rgba(255,255,255,.05); border-radius:6px; height:10px; overflow:hidden; }
  .barFill { height:100%; border-radius:6px; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:4px; margin-right:8px; }
  .row { margin-bottom:14px; }
  .chart { display:flex; align-items:flex-end; gap:3px; height:120px; }
  .chartCol { flex:1; display:flex; align-items:flex-end; height:100%; }
  .chartBar { width:100%; background:#6366f1; border-radius:3px 3px 0 0; min-height:3px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; color:#64748b; font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; padding:0 0 10px; border-bottom:1px solid rgba(255,255,255,.06); }
  td { padding:12px 0; border-bottom:1px solid rgba(255,255,255,.04); color:#cbd5e1; }
  .right { text-align:right; }
  .muted { color:#64748b; font-size:14px; padding:8px 0; }
  .errorBox { background:rgba(244,63,94,.1); border:1px solid rgba(244,63,94,.3); color:#fda4af; padding:16px; border-radius:12px; font-size:14px; }
  .foot { color:#475569; font-size:12px; text-align:center; margin-top:24px; }
  /* login */
  .login { max-width:360px; margin:80px auto; }
  .login input { width:100%; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); color:#fff; padding:13px 14px; border-radius:12px; font-size:15px; margin-top:12px; }
  .login button { width:100%; background:#6366f1; color:#fff; border:0; padding:14px; border-radius:12px; font-size:15px; font-weight:700; margin-top:18px; cursor:pointer; }
  .login button:disabled { opacity:.6; cursor:default; }
  .logout { background:none; border:1px solid rgba(255,255,255,.1); color:#94a3b8; padding:8px 14px; border-radius:10px; font-size:12px; cursor:pointer; }
</style>
</head>
<body>
<div class="wrap" id="root"><div class="muted">Cargando…</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ─────────────────────────────────────────────────────────────────────────────
//  CONFIGURACIÓN  ·  pega tu clave anon pública aquí (es pública, no es secreta).
//  Dónde: Supabase → tu proyecto → Project Settings → API → "anon public".
// ─────────────────────────────────────────────────────────────────────────────
const SUPABASE_URL = "https://fozsvbwagmqblvfurgco.supabase.co";
const SUPABASE_ANON_KEY = "PEGA_AQUI_TU_ANON_PUBLIC_KEY";
// ─────────────────────────────────────────────────────────────────────────────

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const root = document.getElementById("root");

const COMPONENT_LABELS = {
  ai_chat:"Chat IA", image_vision:"Visión / imagen", entry_analysis:"Análisis de entrada",
  pattern_synthesis:"Síntesis de patrones", thread_classification:"Clasificación de chat",
  weekly_report:"Reporte semanal", transcription:"Transcripción de voz",
  embedding:"Embeddings", semantic_search:"Búsqueda semántica"
};
const COLORS = ["#6366f1","#a855f7","#38bdf8","#10b981","#facc15","#f43f5e","#fb923c","#22d3ee","#94a3b8"];
const RANGES = [{label:"7 días",days:7},{label:"30 días",days:30},{label:"90 días",days:90}];
let days = 30;
const usd = n => "$" + (Number(n)||0).toLocaleString("en-US",{minimumFractionDigits:4,maximumFractionDigits:4});
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

async function boot(){
  if(SUPABASE_ANON_KEY.indexOf("PEGA_AQUI")===0){
    root.innerHTML='<div class="errorBox">Falta configurar SUPABASE_ANON_KEY en este archivo (línea ~70). Cópiala de Supabase → Project Settings → API → "anon public".</div>';
    return;
  }
  const { data:{ session } } = await sb.auth.getSession();
  if(!session) return renderLogin();
  renderDashboard();
}

function renderLogin(err){
  root.innerHTML = `
    <div class="login">
      <div class="badge">PANEL DE CONSUMO</div>
      <h1 style="margin:8px 0 4px">Ingresar</h1>
      <div class="muted">Usa tu cuenta de admin de BLACKBOX.</div>
      ${err?`<div class="errorBox" style="margin-top:14px">${esc(err)}</div>`:""}
      <input id="em" type="email" placeholder="correo" autocomplete="username" />
      <input id="pw" type="password" placeholder="contraseña" autocomplete="current-password" />
      <button id="go">Entrar</button>
    </div>`;
  document.getElementById("go").onclick = async (e)=>{
    const b=e.target; b.disabled=true; b.textContent="Entrando…";
    const email=document.getElementById("em").value.trim();
    const password=document.getElementById("pw").value;
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if(error){ renderLogin("No se pudo entrar: "+error.message); }
    else { renderDashboard(); }
  };
}

async function renderDashboard(){
  root.innerHTML='<div class="muted">Cargando datos…</div>';
  const to=new Date(), from=new Date(Date.now()-days*864e5);
  const { data, error } = await sb.rpc("admin_usage_overview",{ p_from:from.toISOString(), p_to:to.toISOString() });
  if(error){
    const msg = (error.message||"").includes("not authorized")
      ? "Tu cuenta no es admin. Marca is_admin = true en tu perfil de Supabase."
      : "Error: "+error.message;
    root.innerHTML = `
      <div class="headerRow"><div><div class="badge">PANEL DE CONSUMO</div><h1>Costo de IA</h1></div>
      <button class="logout" id="lo">Salir</button></div>
      <div class="errorBox">${esc(msg)}</div>`;
    document.getElementById("lo").onclick=async()=>{ await sb.auth.signOut(); renderLogin(); };
    return;
  }
  const d=data||{};
  const comps=d.by_component||[], users=d.top_users||[], daily=d.daily||[];
  const maxDaily=Math.max(1,...daily.map(x=>x.cost));
  const total=Number(d.total_cost)||0;

  root.innerHTML = `
    <div class="headerRow">
      <div><div class="badge">PANEL DE CONSUMO</div><h1>Costo por usuario y componente</h1></div>
      <div style="display:flex;gap:10px;align-items:center">
        <div class="rangeGroup">${RANGES.map(r=>`<button class="rangeBtn ${r.days===days?'active':''}" data-d="${r.days}">${r.label}</button>`).join("")}</div>
        <button class="logout" id="lo">Salir</button>
      </div>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="kpiLabel">Costo total</div><div class="kpiValue">${usd(total)}</div></div>
      <div class="kpi"><div class="kpiLabel">Usuarios activos</div><div class="kpiValue">${d.active_users||0}</div></div>
      <div class="kpi"><div class="kpiLabel">Llamadas</div><div class="kpiValue">${(d.event_count||0).toLocaleString()}</div></div>
      <div class="kpi"><div class="kpiLabel">Costo / usuario</div><div class="kpiValue">${usd(d.active_users?total/d.active_users:0)}</div></div>
    </div>
    <div class="card">
      <div class="cardTitle">QUÉ COMPONENTE CONSUME MÁS</div>
      ${comps.length?comps.map((c,i)=>`
        <div class="row">
          <div class="barHead">
            <span><span class="dot" style="background:${COLORS[i%COLORS.length]}"></span>${esc(COMPONENT_LABELS[c.component]||c.component)}<span class="barSub"> · ${c.events} llamadas</span></span>
            <span class="barVal">${usd(c.cost)} <span class="barSub">(${c.pct}%)</span></span>
          </div>
          <div class="barTrack"><div class="barFill" style="width:${Math.max(2,c.pct)}%;background:${COLORS[i%COLORS.length]}"></div></div>
        </div>`).join(""):'<div class="muted">Sin datos en este período. Usa el chat de la app y recarga.</div>'}
    </div>
    <div class="card">
      <div class="cardTitle">TENDENCIA DIARIA</div>
      <div class="chart">${daily.length?daily.map(x=>`<div class="chartCol" title="${x.day}: ${usd(x.cost)}"><div class="chartBar" style="height:${Math.max(3,(x.cost/maxDaily)*100)}%"></div></div>`).join(""):'<div class="muted">Sin datos.</div>'}</div>
    </div>
    <div class="card">
      <div class="cardTitle">TOP USUARIOS POR COSTO</div>
      <table>
        <thead><tr><th>Usuario</th><th class="right">Llamadas</th><th class="right">Costo</th><th class="right">% del total</th></tr></thead>
        <tbody>${users.length?users.map(u=>`<tr>
          <td>${esc(u.email||u.user_id||"(sin atribuir)")}</td>
          <td class="right">${u.events}</td>
          <td class="right">${usd(u.cost)}</td>
          <td class="right">${total>0?((100*u.cost)/total).toFixed(1):"0"}%</td></tr>`).join(""):'<tr><td colspan="4">Sin datos en este período.</td></tr>'}
        </tbody>
      </table>
    </div>
    <div class="foot">Período: ${new Date(d.from).toLocaleDateString()} – ${new Date(d.to).toLocaleDateString()} · costos estimados</div>`;

  document.getElementById("lo").onclick=async()=>{ await sb.auth.signOut(); renderLogin(); };
  root.querySelectorAll(".rangeBtn").forEach(b=>b.onclick=()=>{ days=Number(b.dataset.d); renderDashboard(); });
}

boot();
</script>
</body>
</html>
